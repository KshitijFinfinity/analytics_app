services:
  backend:
    build:
      context: ./apps/analytics-platform/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in your environment or .env file}
    ports:
      - "4001:4001"
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/analytics-platform/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ANALYTICS_BASE: ${NEXT_PUBLIC_ANALYTICS_BASE:?Set NEXT_PUBLIC_ANALYTICS_BASE to the public backend URL}
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - backend
    ports:
      - "3001:3001"
    restart: unless-stopped
